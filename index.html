<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#0a0e16">
<title>今日訓練</title>
<style>
  :root{
    --page:#0a0e16; --surface:#131824; --surface2:#1a2130; --ink:#ffffff; --ink2:#aab3c5;
    --muted:#6b7488; --line:#232b3d; --teal:#2dd4a0; --blue:#3b82f6; --blueL:#7fb0f9;
    --orange:#ff9f43; --ring:rgba(255,255,255,0.06);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--page);color:var(--ink);font-family:system-ui,-apple-system,"Segoe UI",sans-serif;
       font-size:17px;line-height:1.6;padding-bottom:92px}
  /* ── header ── */
  header{padding:22px 20px 6px}
  header .hi{font-size:1.4rem;font-weight:800;letter-spacing:.3px}
  header .date{color:var(--muted);font-size:.92rem;margin-top:2px}
  header .meta{margin-top:10px;display:flex;flex-wrap:wrap;gap:6px;align-items:center}
  .badge{display:inline-block;font-size:.82rem;padding:4px 12px;border-radius:99px;
         background:var(--surface2);color:var(--ink2);font-weight:600}
  .badge.deload{color:#ffd166;background:#2a2413}
  .badge.streak{color:var(--teal);background:#11251f}
  /* 週曆條 */
  .wstrip{display:flex;gap:6px;margin:14px 16px 0}
  .wstrip .d{flex:1;text-align:center;padding:8px 0;border-radius:14px;background:var(--surface);
             color:var(--muted);font-size:.78rem;line-height:1.35}
  .wstrip .d b{display:block;color:var(--ink2);font-size:1.02rem}
  .wstrip .d span{display:block;font-size:.7rem}
  .wstrip .d.today{background:var(--blue);color:#dbeafe}
  .wstrip .d.today b,.wstrip .d.today span{color:#fff}
  /* ── cards ── */
  .card{background:var(--surface);border:1px solid var(--ring);border-radius:20px;margin:14px 16px;padding:18px}
  .sec{color:var(--muted);font-size:.8rem;font-weight:700;letter-spacing:.12em;text-transform:uppercase}
  h2{font-size:1.12rem;margin-top:2px;font-weight:800}
  .step-head{display:flex;justify-content:space-between;align-items:center;gap:12px}
  .step-sum{display:none;align-items:center;gap:10px;cursor:pointer}
  .step-sum .ok{width:30px;height:30px;border-radius:50%;background:var(--teal);color:#04121c;
                display:flex;align-items:center;justify-content:center;font-weight:900;flex-shrink:0}
  .step-sum .t{font-weight:700}
  .step-sum .s{color:var(--muted);font-size:.88rem}
  .collapsed .step-body{display:none}
  .collapsed .step-sum{display:flex}
  .collapsed h2.step-title,.collapsed .step-title-sec{display:none}
  /* ── 訓練清單（圓形打勾） ── */
  .done-label{color:var(--teal);font-size:.9rem;font-weight:700}
  .ex{display:flex;gap:14px;align-items:flex-start;padding:14px 0;border-bottom:1px solid var(--line)}
  .ex:last-child{border-bottom:none}
  .ex input[type=checkbox]{appearance:none;-webkit-appearance:none;width:27px;height:27px;margin-top:4px;
      border:2px solid var(--muted);border-radius:50%;flex-shrink:0;position:relative;background:transparent}
  .ex input[type=checkbox]:checked{background:var(--teal);border-color:var(--teal)}
  .ex input[type=checkbox]:checked::after{content:'✓';color:#04121c;position:absolute;inset:0;
      display:flex;align-items:center;justify-content:center;font-weight:900;font-size:16px}
  .ex .n{font-weight:700;font-size:1.05rem}
  .ex .m{color:var(--ink2);font-size:.92rem;margin-top:2px}
  .ex .c{color:var(--muted);font-size:.88rem;margin-top:3px}
  .ex.done .n{color:var(--muted);text-decoration:line-through}
  .ringwrap{position:relative;width:64px;height:64px;flex-shrink:0}
  .ringwrap svg{transform:rotate(-90deg)}
  .ringwrap .pct{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
                 font-weight:800;font-size:.92rem;color:var(--teal)}
  .cheer{display:none;text-align:center;padding:14px;color:var(--teal);font-weight:800;font-size:1.12rem}
  .quote{color:var(--ink2);font-size:1rem;font-weight:600;border-left:4px solid var(--orange);
         padding-left:12px;margin:14px 16px;line-height:1.55}
  /* ── 表單 ── */
  label{display:block;color:var(--ink2);font-size:.92rem;margin:12px 0 5px;font-weight:600}
  input[type=number],input[type=date],input[type=text],select{
    width:100%;background:var(--page);color:var(--ink);border:1px solid var(--line);
    border-radius:14px;padding:13px 14px;font-size:1.05rem}
  .row{display:flex;gap:10px}.row>*{flex:1}
  button{background:var(--blue);color:#fff;border:none;border-radius:99px;
         padding:15px 16px;font-size:1.05rem;font-weight:700;width:100%;margin-top:14px}
  button.send{background:var(--teal);color:#04121c}
  button.ghost{background:transparent;border:1px solid var(--line);color:var(--ink2)}
  .seg{display:flex;gap:8px}
  .seg button{margin:0;padding:10px 4px;background:var(--page);border:1px solid var(--line);
              color:var(--ink2);font-size:.98rem;border-radius:16px;flex:1}
  .seg button span{display:block;font-size:.72rem;color:var(--muted);font-weight:600}
  .seg button.on{background:var(--blue);border-color:var(--blue);color:#fff}
  .seg button.on span{color:#dbeafe}
  /* ── tiles / chart / table ── */
  .tiles{display:flex;gap:10px;margin:0 16px}
  .tile{flex:1;background:var(--surface);border:1px solid var(--ring);border-radius:20px;padding:14px}
  .tile .v{font-size:1.7rem;font-weight:800}
  .tile .l{color:var(--muted);font-size:.82rem}
  .tile .d{font-size:.86rem;color:var(--teal);font-weight:700}
  .legend{display:flex;gap:16px;font-size:.86rem;color:var(--ink2);margin:6px 0}
  .legend i{display:inline-block;width:14px;height:3px;border-radius:2px;vertical-align:middle;margin-right:5px}
  svg text{font-family:inherit}
  table{width:100%;border-collapse:collapse;font-size:.94rem}
  td,th{padding:9px 4px;border-bottom:1px solid var(--line);text-align:left}
  th{color:var(--muted);font-weight:700;font-size:.83rem}
  td.num{font-variant-numeric:tabular-nums}
  .tip{position:absolute;background:var(--page);border:1px solid var(--line);border-radius:10px;
       padding:6px 10px;font-size:.84rem;pointer-events:none;display:none;white-space:nowrap;z-index:5}
  .wk{color:var(--muted);font-size:.86rem;margin-top:8px}
  .hint{color:var(--muted);font-size:.86rem;margin-top:8px}
  /* ── nav ── */
  nav{position:fixed;bottom:0;left:0;right:0;display:flex;background:rgba(13,18,28,.92);backdrop-filter:blur(10px);
      border-top:1px solid var(--line);padding-bottom:env(safe-area-inset-bottom)}
  nav button{background:none;border:none;border-radius:0;color:var(--muted);font-size:.82rem;
             padding:10px 0;margin:0;font-weight:700}
  nav button.on{color:var(--blue)}
  nav button .ico{display:block;font-size:1.4rem}
  .page{display:none}.page.on{display:block}
  @media (min-width:520px){
    body{max-width:430px;margin:0 auto;border-left:1px solid var(--line);border-right:1px solid var(--line);min-height:100vh}
    nav{left:50%;transform:translateX(-50%);width:100%;max-width:430px}
  }
</style>
</head>
<body>
<header>
  <div class="hi" id="hGreet">今日訓練</div>
  <div class="date" id="hDate"></div>
  <div class="meta"><span id="phaseBadges"></span><span class="badge streak" id="streak"></span></div>
</header>

<!-- ═══ 今日 ═══ -->
<div class="page on" id="pgToday">
  <div class="wstrip" id="wstrip"></div>

  <!-- Step 1 晨間紀錄 -->
  <div class="card" id="card1">
    <div class="step-sum" onclick="toggleStep1()">
      <div class="ok">✓</div>
      <div><div class="t">Step 1 晨間紀錄 完成</div><div class="s" id="step1Sum"></div></div>
    </div>
    <div class="sec step-title-sec">Step 1</div>
    <h2 class="step-title">晨間紀錄</h2>
    <div class="step-body">
      <label>體重 kg</label><input type="number" id="inW" step="0.1" inputmode="decimal" placeholder="70.0">
      <label>昨晚睡眠（90 分鐘一個循環）</label>
      <div class="seg" id="segS">
        <button type="button" onclick="setSleep(3,this)">😴 優<span>≥7.5h（5循環）</span></button>
        <button type="button" onclick="setSleep(2,this)">🙂 普<span>6–7.5h（4循環）</span></button>
        <button type="button" onclick="setSleep(1,this)">😪 差<span>&lt;6h</span></button>
      </div>
      <div class="row">
        <div><label>腰圍 cm（週日）</label><input type="number" id="inWa" step="0.5" inputmode="decimal" placeholder="選填"></div>
        <div><label>備註</label><input type="text" id="inN" placeholder="痛點/狀態"></div>
      </div>
      <button onclick="saveLog()">儲存今日紀錄</button>
      <div class="hint">定好起床時間往回推 5 個循環＋15 分入睡緩衝＝就寢時間。睡「差」的日子：晨間 HIIT 跳過、肌力每動作少 1 組。</div>
    </div>
  </div>

  <!-- Step 2 今日訓練 -->
  <div class="card">
    <div class="step-head">
      <div><div class="sec">Step 2</div><h2 id="wName"></h2>
        <div class="done-label" id="progTxt"></div></div>
      <div class="ringwrap">
        <svg width="64" height="64"><circle cx="32" cy="32" r="27" fill="none" stroke="var(--line)" stroke-width="7"/>
        <circle id="ringFg" cx="32" cy="32" r="27" fill="none" stroke="var(--teal)" stroke-width="7"
                stroke-linecap="round" stroke-dasharray="169.6" stroke-dashoffset="169.6"/></svg>
        <div class="pct" id="ringPct">0%</div>
      </div>
    </div>
    <div id="wNote" class="hint"></div>
    <div id="exList"></div>
    <div class="cheer" id="cheer">🎉 今日課表完成！你又比昨天的自己強了一點 💪</div>
    <button class="send" id="btnSend" onclick="sendToday()">📤 送出今日資料（晨間紀錄＋訓練打勾 → Obsidian）</button>
    <div class="hint" id="saveMsg"></div>
  </div>

  <div class="quote" id="quote"></div>
</div>

<!-- ═══ 趨勢 ═══ -->
<div class="page" id="pgTrend">
  <div class="tiles">
    <div class="tile"><div class="v" id="tAvg">—</div><div class="l">7 天均重 kg</div><div class="d" id="tAvgD"></div></div>
    <div class="tile"><div class="v" id="tGoal">—</div><div class="l">距目標 60kg</div></div>
    <div class="tile"><div class="v" id="tWk">—</div><div class="l">本週訓練</div></div>
  </div>
  <div class="card" style="position:relative">
    <div class="sec">Progress</div><h2>體重趨勢</h2>
    <div class="legend">
      <span><i style="background:var(--blueL);height:8px;width:8px;border-radius:50%"></i>每日</span>
      <span><i style="background:var(--blue)"></i>7 天平均</span>
      <span style="color:var(--muted)">- - 目標 60</span>
    </div>
    <svg id="chart" width="100%" height="230" role="img" aria-label="體重趨勢圖，數據見下表"></svg>
    <div class="tip" id="tip"></div>
  </div>
  <div class="card">
    <h2>紀錄（同圖表數據）</h2>
    <table id="logTable"><thead><tr><th>日期</th><th>體重</th><th>睡眠</th><th>腰圍</th><th>訓練</th></tr></thead><tbody></tbody></table>
    <button class="ghost" onclick="copyCSV()">📋 複製全部 CSV（給 AI 分析）</button>
  </div>
</div>

<!-- ═══ 課表 ═══ -->
<div class="page" id="pgPlan">
  <div class="card">
    <h2>週課表總覽</h2>
    <div class="row">
      <div><label>看第幾週</label><input type="number" id="inWk" min="1" max="52" onchange="renderPlan()"></div>
    </div>
    <div id="planView"></div>
  </div>
  <div class="card">
    <h2>設定</h2>
    <label>計畫開始日（W1 週一）</label><input type="date" id="inStart" onchange="saveCfg()">
    <label>Obsidian vault 名稱</label><input type="text" id="inVault" onchange="saveCfg()">
    <label>日誌檔路徑</label><input type="text" id="inPath" onchange="saveCfg()">
    <div class="hint">完整計畫文件（動作導引卡＋教學影片＋營養）在 Obsidian 待看夾與 StanleyBrain repo。</div>
  </div>
</div>

<nav>
  <button class="on" style="flex:1" onclick="go('Today',this)"><span class="ico">🏋️</span>今日</button>
  <button style="flex:1" onclick="go('Trend',this)"><span class="ico">📈</span>趨勢</button>
  <button style="flex:1" onclick="go('Plan',this)"><span class="ico">📅</span>課表</button>
</nav>

<script>
/* ── 資料：課表定義（Phase 1/2 計畫文件為準） ── */
const EX = {
  sq:{n:'椅子輔助箱式深蹲→酒杯蹲',m:'3×8–10｜RPE6–7｜3-1-1｜休90s',c:'膝蓋推向小趾方向；碰椅即起、不坐死'},
  cp:{n:'Torus 5 坐姿胸推',m:'3×10–12｜RPE6–7｜3-1-1｜休75s',c:'肩胛後收下沉貼椅背；手肘貼身45°'},
  rw:{n:'Torus 5 坐姿划船',m:'3×10–12｜RPE6–7｜2-1-2｜休75s',c:'手肘往後口袋插；上身像釘住的門柱'},
  rdl:{n:'彈力繩羅馬尼亞硬舉',m:'3×12｜RPE6｜3-1-1｜休60s',c:'屁股往後推、繩到小腿中段即停；胸口挺'},
  fp:{n:'彈力繩面拉',m:'2×15｜RPE5–6｜休45s',c:'先沉肩胛再拉；想像把繩子撕開'},
  db:{n:'死蟲式',m:'2×8/側｜慢而穩｜休30s',c:'腰全程貼地；下放時長吐氣'},
  gb:{n:'臀橋（W3起單腳漸進）',m:'3×12–15｜RPE6–7｜頂端夾2秒｜休60s',c:'臀夾緊、肋骨收住；腰有感=做錯'},
  lp:{n:'Torus 5 滑輪下拉（胸前）',m:'3×10–12｜RPE6–7｜2-1-2｜休75s',c:'手肘往骨盆拉；手掌只是鉤子'},
  ip:{n:'上斜伏地挺身',m:'3×8–12｜RPE6–7｜3-1-1｜休60s',c:'身體一塊板；手肘往後45°不外開'},
  pp:{n:'帕洛夫推壓',m:'2×10/側｜推出停3秒｜休45s',c:'核心抗旋轉撐住不動；推出時吐氣'},
  er:{n:'彈力繩肩外旋',m:'2×15/側｜RPE5｜休30s',c:'手肘夾毛巾當門軸；永遠用輕阻力'},
  bd:{n:'鳥狗式',m:'2×8/側｜頂端停3秒｜休30s',c:'腰上放一杯水不能灑；延伸不是抬高'},
  mc:{n:'麥吉爾捲腹',m:'2×6/側｜頂端停8秒',c:'頭肩只離地一張紙的高度'},
  spl:{n:'側棒式（膝著地起步）',m:'2×20–30s/側',c:'恥骨往前推、把地板推遠'},
  ss:{n:'分腿蹲',m:'3×8–10/側｜RPE6–7｜休60s',c:'像電梯垂直下降；體重8成在前腳'},
  op:{n:'彈力繩斜上推45°',m:'3×10/側｜RPE6–7｜休60s',c:'往前上方45°牆角推；肩刺痛立停'},
  srdl:{n:'單腳羅馬尼亞硬舉',m:'3×10/側｜RPE6｜休60s',c:'褲頭兩邊一樣高；後腳趾指地板'},
  lc:{n:'Torus 5 腿彎舉',m:'3×10–12｜RPE6–7｜3秒慢放｜休60s',c:'肚子夾緊只有小腿動'},
  cc:{n:'跪姿滑輪捲腹',m:'3×12｜RPE7｜休45s',c:'用腹肌捲、不是用手拉'},
  lr:{n:'彈力繩側平舉（拇指朝上）',m:'3×12–15｜RPE6｜休45s',c:'肩胛平面、舉到肩高即可'},
  td:{n:'滑輪三頭下壓',m:'3×12｜RPE6–7｜休45s',c:'手肘釘在身側'},
  bc:{n:'二頭彎舉（低滑輪/彈力繩）',m:'3×12｜RPE6–7｜休45s',c:'手肘不前移'},
  walk:{n:'快走',m:'30–40 分',c:'能講話但不能唱歌的速度'},
  liss:{n:'LISS 快走',m:'45–60 分',c:'脂肪氧化主場，戴耳機聽 podcast'},
  yoga:{n:'瑜珈舒緩＋量測日',m:'腰圍＋照片＋看七天均重',c:'讓身體休一天'},
};
const W = {
  A:{name:'肌力 A｜蹲＋水平推拉（45分）',ex:['sq','cp','rw','rdl','fp','db']},
  B:{name:'肌力 B｜髖＋垂直拉（45分）',ex:['gb','lp','ip','pp','er','bd']},
  M:{name:'保養套餐｜護腰護肩（12分）',ex:['mc','spl','bd','er','fp']},
  L1:{name:'下肢 1（45分）',ex:['sq','lc','rdl','spl']},
  U1:{name:'上肢 1｜推主導（45分）',ex:['cp','op','lp','fp']},
  L2:{name:'下肢 2｜單邊（45分）',ex:['ss','srdl','gb','pp']},
  U2:{name:'上肢 2｜拉主導（45分）',ex:['rw','ip','lp','er']},
  AB1:{name:'＋腹肌專項（10分）',ex:['cc','spl']},
  AB2:{name:'＋腹肌專項（10分）',ex:['db','pp']},
  AR1:{name:'＋弱點優先（10分）',ex:['lr','td']},
  AR2:{name:'＋弱點優先（10分）',ex:['bc','fp']},
  WALK:{name:'低強度有氧',ex:['walk']},
  LISS:{name:'LISS 有氧日',ex:['liss']},
  REST:{name:'休息日',ex:['yoga']},
};
/* 週 → 每日課表鍵。dow: 0=日…6=六 */
function schedule(wk){
  if(wk<=12) return {1:['A'],2:['M'],3:['B'],4:['M'],5:[wk%2?'A':'B'],6:['WALK'],0:['REST']};
  if(wk<=24) return {1:['L1'],2:['U1'],3:['REST'],4:['L2'],5:['U2'],6:['WALK'],0:['REST']};
  return {1:['L1','AB1'],2:['U1','AR1'],3:['REST'],4:['L2','AB2'],5:['U2','AR2'],6:['LISS'],0:['REST']};
}
const PHASE=w=>w<=12?'基礎鞏固期':w<=24?'肌力累積期':'分化專項期';
const QUOTES=[
 '你不是在減重，你是在把 10 年後的自己練回來。',
 '46 歲開始永遠不晚——晚的是明天才開始。',
 '每一組慢放下，都是存進關節的退休金。',
 '腹肌是在廚房跟餐桌上刻出來的，訓練只是雕刻刀。',
 '今天只要出現，就贏過 90% 躺著的人。',
 '肌肉不知道今天星期幾，它只知道你有沒有來。',
 '睡飽的那天，你舉起的不只是重量，還有恢復力。',
 '慢就是穩，穩就是快——關節版的複利。',
 '你在教兒子最重要的一課：身體是可以被管理的。',
 '體重機量的是水分心情和昨晚的麵，趨勢線量的才是你。',
 '最好的計畫，是你做得完的那一個。',
 '疲勞會說謊，日誌不會——記下來就好。',
 '減量週不是偷懶，是聰明人的火力保養。',
 '你已經比開始前的自己強了，證據就在打勾裡。',
 '呼吸中止的最強處方箋，正在你手上執行。',
];
/* ── 狀態 ── */
const LS=localStorage;
const cfg=JSON.parse(LS.getItem('cfg')||'{"start":"2026-07-06","vault":"StanleyInbox","path":"健身日誌.md"}');
const logs=JSON.parse(LS.getItem('logs')||'{}');   // {date:{w,s,wa,n,done,workout,sent}}
const today=new Date(); today.setHours(0,0,0,0);
const iso=d=>d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'); // 本地時區，避免 UTC 差一天
const TD=iso(today);
function weekOf(d){const s=new Date(cfg.start+'T00:00:00');return Math.floor((d-s)/6048e5)+1}
const wk=weekOf(today), dow=today.getDay();
const isDeload=w=>w>0&&w%4===0;
const SLPT={3:'😴 優',2:'🙂 普',1:'😪 差'};

/* ── 今日頁 ── */
function dayKeys(w,dw){return schedule(Math.max(w,1))[dw]}
function streak(){
  let n=0,d=new Date(today);
  const active=k=>{const l=logs[k];return l&&((l.done&&Object.values(l.done).some(Boolean))||l.w)};
  if(!active(iso(d)))d.setDate(d.getDate()-1);
  while(active(iso(d))){n++;d.setDate(d.getDate()-1)}
  return n;
}
const DOWCH=['日','一','二','三','四','五','六'];
const TAG={A:'肌力',B:'肌力',M:'保養',L1:'下肢',U1:'上肢',L2:'下肢',U2:'上肢',WALK:'快走',LISS:'有氧',REST:'休'};
function renderStrip(){
  const mon=new Date(today);mon.setDate(mon.getDate()-((dow+6)%7));
  let h='';
  for(let i=0;i<7;i++){
    const d=new Date(+mon+i*864e5), key=dayKeys(weekOf(d),d.getDay())[0];
    h+='<div class="d'+(iso(d)===TD?' today':'')+'">'+DOWCH[d.getDay()]+'<b>'+d.getDate()+'</b><span>'+(TAG[key]||'')+'</span></div>';
  }
  document.getElementById('wstrip').innerHTML=h;
}
let step1Open=null; // null=自動判斷
function morningDone(){const l=logs[TD]||{};return !!(l.w||l.s)}
function toggleStep1(){step1Open=true;renderStep1()}
function renderStep1(){
  const done=morningDone(), open=step1Open===null?!done:step1Open;
  const card=document.getElementById('card1');
  card.className='card'+((done&&!open)?' collapsed':'');
  const l=logs[TD]||{};
  document.getElementById('step1Sum').textContent=((l.w?l.w+' kg':'')+(l.s?'・'+SLPT[l.s]:'')||'')+'（點我展開修改）';
}
function renderToday(){
  const h=new Date().getHours();
  document.getElementById('hGreet').textContent=h<11?'早安！今天也來變強 👋':h<18?'午安！保持節奏 ⚡':'晚上好！練起來 🔥';
  document.getElementById('hDate').textContent=today.toLocaleDateString('zh-TW',{month:'long',day:'numeric',weekday:'long'});
  const sk=streak();
  document.getElementById('streak').textContent=sk>0?'🔥 連續 '+sk+' 天':'✨ 第 1 天';
  const badges=document.getElementById('phaseBadges');
  if(wk<1){badges.innerHTML='<span class="badge">計畫 '+cfg.start+' 開跑</span>';}
  else badges.innerHTML='<span class="badge">第 '+wk+' 週｜'+PHASE(wk)+'</span>'+(isDeload(wk)?'<span class="badge deload">🔋 減量週</span>':'');
  renderStrip(); renderStep1();
  const keys=dayKeys(wk,dow);
  document.getElementById('wName').textContent=keys.map(k=>W[k].name).join(' ');
  document.getElementById('wNote').textContent=isDeload(wk)&&keys[0]!=='REST'?'減量週：全動作組數減半、阻力 −20%、RPE ≤6。照做，這是計畫的一部分。':'暖身：最偉大拉伸×3 → 開始。收操：瑜珈舒緩 10 分。';
  const st=(logs[TD]&&logs[TD].done)||{};
  const list=document.getElementById('exList');
  list.innerHTML='';
  let items=[];keys.forEach(k=>items=items.concat(W[k].ex));
  items.forEach(id=>{
    const e=EX[id],d=!!st[id];
    const div=document.createElement('div');div.className='ex'+(d?' done':'');
    div.innerHTML='<input type="checkbox" '+(d?'checked':'')+' onchange="tick(\''+id+'\',this.checked)"><div><div class="n">'+e.n+'</div><div class="m">'+e.m+'</div><div class="c">💡 '+e.c+'</div></div>';
    list.appendChild(div);
  });
  const done=items.filter(i=>st[i]).length, pct=items.length?Math.round(100*done/items.length):0;
  document.getElementById('progTxt').textContent=items.length?done+' / '+items.length+' 完成':'';
  document.getElementById('ringPct').textContent=pct+'%';
  document.getElementById('ringFg').setAttribute('stroke-dashoffset',String(169.6*(1-pct/100)));
  document.getElementById('cheer').style.display=(items.length&&done===items.length)?'block':'none';
  document.getElementById('btnSend').textContent=(logs[TD]&&logs[TD].sent)?'✅ 已送出（再按會重送最新狀態）':'📤 送出今日資料（晨間紀錄＋訓練打勾 → Obsidian）';
  const q=QUOTES[(today.getDate()+today.getMonth())%QUOTES.length];
  document.getElementById('quote').textContent='💬 '+q;
}
function tick(id,v){
  logs[TD]=logs[TD]||{};logs[TD].done=logs[TD].done||{};logs[TD].done[id]=v;
  logs[TD].workout=dayKeys(wk,dow).join('+');
  LS.setItem('logs',JSON.stringify(logs));renderToday();renderTrend();
}
let _sleep=0;
function setSleep(v,btn){
  _sleep=v;
  document.querySelectorAll('#segS button').forEach(b=>b.classList.remove('on'));
  if(btn)btn.classList.add('on');
}
function saveLog(){
  logs[TD]=logs[TD]||{};
  const g=i=>document.getElementById(i).value;
  if(g('inW'))logs[TD].w=+g('inW');
  if(_sleep)logs[TD].s=_sleep;
  if(g('inWa'))logs[TD].wa=+g('inWa');
  if(g('inN'))logs[TD].n=g('inN');
  logs[TD].workout=logs[TD].workout||dayKeys(wk,dow).join('+');
  LS.setItem('logs',JSON.stringify(logs));
  step1Open=false;
  document.getElementById('saveMsg').textContent='✅ 晨間紀錄已存。練完打勾後按上面的「送出今日資料」。';
  renderToday();renderTrend();
}
function sendToday(){
  const l=logs[TD]||{};
  const keys=dayKeys(wk,dow);
  let items=[];keys.forEach(k=>items=items.concat(W[k].ex));
  const done=items.filter(i=>l.done&&l.done[i]).length;
  const note=((l.n||'')+(items.length?(' 完成'+done+'/'+items.length):'')).trim();
  const line=[TD,l.w||'',(l.workout||keys.join('+')),l.s||'',l.wa||'',note].join(',');
  logs[TD]=l;l.sent=true;LS.setItem('logs',JSON.stringify(logs));
  renderToday();
  location.href='obsidian://adv-uri?vault='+encodeURIComponent(cfg.vault)+'&filepath='+encodeURIComponent(cfg.path)+'&data='+encodeURIComponent(line)+'&mode=append';
}
/* ── 趨勢頁 ── */
function series(){
  return Object.keys(logs).filter(d=>logs[d].w).sort().map(d=>({d,w:logs[d].w}));
}
function avg7(arr,i){
  const t0=new Date(arr[i].d+'T00:00:00')-6048e5;
  const win=arr.filter(p=>new Date(p.d+'T00:00:00')>t0&&p.d<=arr[i].d);
  return win.reduce((s,p)=>s+p.w,0)/win.length;
}
let pts=[];
function renderTrend(){
  const s=series();
  const tb=document.querySelector('#logTable tbody');tb.innerHTML='';
  Object.keys(logs).sort().reverse().slice(0,30).forEach(d=>{const l=logs[d];
    tb.insertAdjacentHTML('beforeend','<tr><td class="num">'+d.slice(5)+'</td><td class="num">'+(l.w||'—')+'</td><td>'+(SLPT[l.s]||'—')+'</td><td class="num">'+(l.wa||'—')+'</td><td>'+(l.done&&Object.values(l.done).some(Boolean)?'✅':'—')+'</td></tr>');});
  const a7=s.length?avg7(s,s.length-1):null;
  document.getElementById('tAvg').textContent=a7?a7.toFixed(1):'—';
  document.getElementById('tGoal').textContent=a7?(a7-60).toFixed(1):'—';
  if(s.length>7){const prev=avg7(s,s.length-2);const d=a7-prev;
    document.getElementById('tAvgD').textContent=(d<=0?'↓ ':'↑ ')+Math.abs(d).toFixed(2);}
  const mon=new Date(today);mon.setDate(mon.getDate()-((dow+6)%7));
  let n=0,target=wk<=12?3:4;
  for(let i=0;i<7;i++){const d=iso(new Date(+mon+i*864e5));
    if(logs[d]&&logs[d].done&&Object.values(logs[d].done).some(Boolean)&&!['REST','WALK','LISS','M'].includes((logs[d].workout||'').split('+')[0]))n++;}
  document.getElementById('tWk').textContent=n+'/'+target;
  drawChart(s);
}
function drawChart(s){
  const svg=document.getElementById('chart');const Wd=svg.clientWidth||340,H=230,P={l:34,r:10,t:10,b:22};
  svg.setAttribute('viewBox','0 0 '+Wd+' '+H);svg.innerHTML='';pts=[];
  if(s.length<2){svg.innerHTML='<text x="'+Wd/2+'" y="110" fill="#6b7488" text-anchor="middle" font-size="13">記錄 2 天以上就會出現趨勢線</text>';return}
  const xs=s.map(p=>+new Date(p.d+'T00:00:00'));
  const ys=s.map(p=>p.w).concat(s.map((_,i)=>avg7(s,i))).concat([60]);
  const x0=Math.min(...xs),x1=Math.max(...xs);
  let y0=Math.min(...ys)-.5,y1=Math.max(...ys)+.5;
  const X=v=>P.l+(Wd-P.l-P.r)*(x1===x0?0.5:(v-x0)/(x1-x0));
  const Y=v=>P.t+(H-P.t-P.b)*(1-(v-y0)/(y1-y0));
  let g='';
  for(let v=Math.ceil(y0);v<=y1;v++){g+='<line x1="'+P.l+'" x2="'+(Wd-P.r)+'" y1="'+Y(v)+'" y2="'+Y(v)+'" stroke="var(--line)" stroke-width="1"/><text x="'+(P.l-6)+'" y="'+(Y(v)+4)+'" fill="var(--muted)" font-size="10" text-anchor="end">'+v+'</text>';}
  g+='<line x1="'+P.l+'" x2="'+(Wd-P.r)+'" y1="'+Y(60)+'" y2="'+Y(60)+'" stroke="var(--muted)" stroke-width="1" stroke-dasharray="4 4"/>';
  s.forEach((p,i)=>{pts.push({x:X(xs[i]),y:Y(p.w),d:p.d,w:p.w,a:avg7(s,i)});});
  g+=pts.map(p=>'<circle cx="'+p.x+'" cy="'+p.y+'" r="3.5" fill="var(--blueL)"/>').join('');
  g+='<path d="'+pts.map((p,i)=>(i?'L':'M')+p.x+' '+Y(p.a)).join('')+'" fill="none" stroke="var(--blue)" stroke-width="2" stroke-linejoin="round"/>';
  const last=pts[pts.length-1];
  g+='<text x="'+(last.x-4)+'" y="'+(Y(last.a)-8)+'" fill="var(--ink2)" font-size="11" text-anchor="end">'+last.a.toFixed(1)+'</text>';
  const d0=s[0].d.slice(5),d1=s[s.length-1].d.slice(5);
  g+='<text x="'+P.l+'" y="'+(H-6)+'" fill="var(--muted)" font-size="10">'+d0+'</text><text x="'+(Wd-P.r)+'" y="'+(H-6)+'" fill="var(--muted)" font-size="10" text-anchor="end">'+d1+'</text>';
  svg.innerHTML=g;
}
(function(){ /* hover/touch tooltip */
  const svg=document.getElementById('chart'),tip=document.getElementById('tip');
  function mv(ev){
    if(!pts.length)return;
    const r=svg.getBoundingClientRect(),x=(ev.touches?ev.touches[0].clientX:ev.clientX)-r.left;
    let best=pts[0];pts.forEach(p=>{if(Math.abs(p.x-x)<Math.abs(best.x-x))best=p});
    tip.style.display='block';tip.style.left=Math.min(best.x+10,r.width-120)+'px';tip.style.top=(best.y+20)+'px';
    tip.innerHTML=best.d.slice(5)+'｜'+best.w+' kg<br>7日均 '+best.a.toFixed(1);
  }
  svg.addEventListener('pointermove',mv);svg.addEventListener('touchstart',mv,{passive:true});
  svg.addEventListener('pointerleave',()=>tip.style.display='none');
})();
/* ── 匯出 ── */
function csv(){
  let out='date,weight_kg,workout,sleep_score,waist_cm,note\n';
  Object.keys(logs).sort().forEach(d=>{const l=logs[d];
    out+=[d,l.w||'',l.workout||'',l.s||'',l.wa||'',(l.n||'').replace(/,/g,'；')].join(',')+'\n';});
  return out;
}
function copyCSV(){navigator.clipboard.writeText(csv()).then(()=>alert('已複製 '+Object.keys(logs).length+' 天紀錄。貼給 Claude 分析，或貼進健身日誌備份。'))}
/* ── 課表頁 / 設定 ── */
function renderPlan(){
  const w=+document.getElementById('inWk').value||Math.max(wk,1);
  const sc=schedule(w),names=['日','一','二','三','四','五','六'];
  let h='<div class="wk">第 '+w+' 週｜'+PHASE(w)+(isDeload(w)?'｜🔋 減量週':'')+'</div>';
  [1,2,3,4,5,6,0].forEach(d=>{
    h+='<div class="ex"><div><div class="n">週'+names[d]+'</div><div class="m">'+sc[d].map(k=>W[k].name).join('｜')+'</div><div class="c">'+sc[d].flatMap(k=>W[k].ex).map(i=>EX[i].n).join('、')+'</div></div></div>';});
  document.getElementById('planView').innerHTML=h;
}
function saveCfg(){
  cfg.start=document.getElementById('inStart').value||cfg.start;
  cfg.vault=document.getElementById('inVault').value||cfg.vault;
  cfg.path=document.getElementById('inPath').value||cfg.path;
  LS.setItem('cfg',JSON.stringify(cfg));location.reload();
}
function go(p,btn){
  document.querySelectorAll('.page').forEach(e=>e.classList.remove('on'));
  document.getElementById('pg'+p).classList.add('on');
  document.querySelectorAll('nav button').forEach(b=>b.classList.remove('on'));btn.classList.add('on');
  if(p==='Trend')renderTrend();if(p==='Plan')renderPlan();
}
/* init */
document.getElementById('inStart').value=cfg.start;
document.getElementById('inVault').value=cfg.vault;
document.getElementById('inPath').value=cfg.path;
document.getElementById('inWk').value=Math.max(wk,1);
if(logs[TD]){if(logs[TD].w)document.getElementById('inW').value=logs[TD].w;if(logs[TD].n)document.getElementById('inN').value=logs[TD].n;
  if(logs[TD].s)setSleep(logs[TD].s,document.querySelectorAll('#segS button')[3-logs[TD].s]);}
renderToday();renderTrend();
</script>
</body>
